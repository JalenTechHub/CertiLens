<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CertiLens Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:         #0a0e13;
      --surface:    #111620;
      --border:     #1e2a38;
      --border-2:   #253040;
      --text:       #c8d8e8;
      --text-dim:   #5a7a94;
      --text-muted: #3a5060;
      --accent:     #00d4ff;
      --accent-dim: rgba(0, 212, 255, 0.1);
      --low:        #22c55e;
      --medium:     #f59e0b;
      --high:       #ef4444;
      --critical:   #ff2266;
      --critical-bg:rgba(255, 34, 102, 0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 380px;
      min-height: 520px;
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 13px;
      overflow-x: hidden;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #00d4ff 0%, #0066ff 100%);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .logo-text {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: #fff;
    }

    .logo-text span {
      color: var(--accent);
    }

    .header-actions {
      display: flex;
      gap: 6px;
    }

    .icon-btn {
      width: 28px;
      height: 28px;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      font-size: 13px;
    }

    .icon-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }

    /* ── URL Bar ── */
    .url-bar {
      padding: 10px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .url-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--text-dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
    }

    .protocol-badge {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 3px;
      letter-spacing: 0.05em;
      flex-shrink: 0;
    }

    .protocol-badge.https {
      background: rgba(34, 197, 94, 0.12);
      color: var(--low);
      border: 1px solid rgba(34, 197, 94, 0.25);
    }

    .protocol-badge.http {
      background: rgba(239, 68, 68, 0.12);
      color: var(--high);
      border: 1px solid rgba(239, 68, 68, 0.25);
    }

    /* ── Score Display ── */
    .score-section {
      padding: 20px 16px;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .score-ring-wrap {
      position: relative;
      width: 88px;
      height: 88px;
      flex-shrink: 0;
    }

    .score-ring {
      transform: rotate(-90deg);
    }

    .score-ring-bg {
      fill: none;
      stroke: var(--border-2);
      stroke-width: 6;
    }

    .score-ring-fill {
      fill: none;
      stroke-width: 6;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.8s cubic-bezier(0.4, 0, 0.2, 1),
                  stroke 0.4s ease;
      stroke-dasharray: 245;
      stroke-dashoffset: 245;
    }

    .score-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .score-number {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 24px;
      font-weight: 600;
      line-height: 1;
    }

    .score-label {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-top: 2px;
    }

    .score-meta {
      flex: 1;
      min-width: 0;
    }

    .risk-level-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      padding: 4px 10px;
      border-radius: 4px;
      margin-bottom: 8px;
    }

    .risk-level-badge.LOW      { background: rgba(34, 197, 94, 0.12); color: var(--low);    border: 1px solid rgba(34, 197, 94, 0.3); }
    .risk-level-badge.MEDIUM   { background: rgba(245, 158, 11, 0.12); color: var(--medium); border: 1px solid rgba(245, 158, 11, 0.3); }
    .risk-level-badge.HIGH     { background: rgba(239, 68, 68, 0.12);  color: var(--high);   border: 1px solid rgba(239, 68, 68, 0.3); }
    .risk-level-badge.CRITICAL { background: var(--critical-bg);       color: var(--critical);border: 1px solid rgba(255, 34, 102, 0.3); }

    .pulse {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }

    .scan-duration {
      font-size: 11px;
      color: var(--text-muted);
      font-family: 'IBM Plex Mono', monospace;
    }

    .scan-btn {
      margin-top: 8px;
      width: 100%;
      padding: 8px;
      background: linear-gradient(135deg, rgba(0, 212, 255, 0.15), rgba(0, 102, 255, 0.15));
      border: 1px solid rgba(0, 212, 255, 0.35);
      border-radius: 6px;
      color: var(--accent);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
    }

    .scan-btn:hover {
      background: linear-gradient(135deg, rgba(0, 212, 255, 0.25), rgba(0, 102, 255, 0.25));
      border-color: var(--accent);
    }

    .scan-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ── Loading State ── */
    .loading-state {
      padding: 24px 16px;
      text-align: center;
    }

    .loading-bars {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 3px;
      height: 28px;
      margin-bottom: 12px;
    }

    .loading-bars span {
      width: 4px;
      background: var(--accent);
      border-radius: 2px;
      animation: bar 1.2s ease-in-out infinite;
    }

    .loading-bars span:nth-child(1) { animation-delay: 0s;    height: 10px; }
    .loading-bars span:nth-child(2) { animation-delay: 0.1s;  height: 18px; }
    .loading-bars span:nth-child(3) { animation-delay: 0.2s;  height: 24px; }
    .loading-bars span:nth-child(4) { animation-delay: 0.3s;  height: 18px; }
    .loading-bars span:nth-child(5) { animation-delay: 0.4s;  height: 10px; }

    @keyframes bar {
      0%, 100% { opacity: 0.3; transform: scaleY(0.5); }
      50%       { opacity: 1;   transform: scaleY(1.2); }
    }

    .loading-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 0.08em;
    }

    .loading-sublabel {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* ── Engine Grid ── */
    .section-header {
      padding: 8px 16px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .engines-grid {
      padding: 10px 16px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .engine-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      cursor: default;
      transition: border-color 0.15s;
      position: relative;
      overflow: hidden;
    }

    .engine-card:hover { border-color: var(--border-2); }

    .engine-card.risk-low      { border-left: 3px solid rgba(34, 197, 94, 0.5); }
    .engine-card.risk-medium   { border-left: 3px solid rgba(245, 158, 11, 0.5); }
    .engine-card.risk-high     { border-left: 3px solid rgba(239, 68, 68, 0.5); }
    .engine-card.risk-critical { border-left: 3px solid rgba(255, 34, 102, 0.7); }
    .engine-card.risk-na       { border-left: 3px solid var(--border); }

    .engine-name {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 4px;
    }

    .engine-value {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    .engine-detail {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Reasons List ── */
    .reasons-list {
      padding: 8px 16px 12px;
    }

    .reason-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 7px 0;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
    }

    .reason-item:last-child { border-bottom: none; }

    .reason-icon {
      font-size: 12px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .reason-text {
      color: var(--text);
      line-height: 1.4;
    }

    /* ── Footer ── */
    .footer {
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface);
    }

    .footer-btn {
      flex: 1;
      padding: 7px 10px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text-dim);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }

    .footer-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }

    /* ── Empty State ── */
    .empty-state {
      padding: 36px 24px;
      text-align: center;
    }

    .empty-icon {
      font-size: 36px;
      margin-bottom: 12px;
      opacity: 0.4;
    }

    .empty-title {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-dim);
      margin-bottom: 6px;
      letter-spacing: 0.06em;
    }

    .empty-desc {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 16px;
    }

    /* ── Demo badge ── */
    .demo-banner {
      padding: 6px 16px;
      background: rgba(245, 158, 11, 0.08);
      border-bottom: 1px solid rgba(245, 158, 11, 0.2);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--medium);
      letter-spacing: 0.08em;
      text-align: center;
    }

    /* ── Tooltip ── */
    [data-tooltip] {
      position: relative;
    }

    [data-tooltip]::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: #1e2a38;
      border: 1px solid var(--border-2);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 11px;
      font-weight: 400;
      padding: 5px 8px;
      border-radius: 4px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s;
      z-index: 100;
      max-width: 200px;
      white-space: normal;
      text-align: center;
    }

    [data-tooltip]:hover::after { opacity: 1; }

    /* color helpers */
    .color-low      { color: var(--low); }
    .color-medium   { color: var(--medium); }
    .color-high     { color: var(--high); }
    .color-critical { color: var(--critical); }
    .color-dim      { color: var(--text-dim); }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="logo">
      <div class="logo-icon">🔍</div>
      <div class="logo-text">Certi<span>Lens</span> Pro</div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="btn-demo" data-tooltip="Toggle Demo Mode" title="Demo">⚡</button>
      <button class="icon-btn" id="btn-settings" data-tooltip="Open Dashboard & Settings">⚙</button>
    </div>
  </div>

  <!-- Main content -->
  <div id="main-content">
    <!-- Filled by popup.js -->
  </div>

  <!-- Footer -->
  <div class="footer" id="footer" style="display:none">
    <button class="footer-btn" id="btn-export" data-tooltip="Export security report">Export</button>
    <button class="footer-btn" id="btn-history" data-tooltip="View scan history">History</button>
    <button class="footer-btn" id="btn-rescan" data-tooltip="Re-run analysis">Rescan</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
